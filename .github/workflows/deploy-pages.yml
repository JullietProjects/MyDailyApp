# Builds the Vite app and pushes ./dist to branch `gh-pages`.
# That branch should contain only production static files (no /src/main.tsx).
#
# In the repo on GitHub:
#   Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
#
# (Do not use the repo's main-branch root as the site root: that serves source
# index.html and breaks the app with 404 on /src/main.tsx.)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify Vite output (built index, not dev /src/main.tsx)
        run: |
          test -f dist/index.html
          grep -q 'assets/index' dist/index.html || (echo 'dist must reference hashed JS/CSS' && exit 1)
          grep -q '/MyDailyApp/' dist/index.html || (echo 'dist must use base /MyDailyApp/' && exit 1)
          if grep -q '/src/main.tsx' dist/index.html; then echo 'dist must not contain dev entry /src/main.tsx' && exit 1; fi
      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
