# Publishes ./dist from the build job. In the repo on GitHub:
# Settings → Pages → Build and deployment → Source: GitHub Actions
# (If Source is “Deploy from branch”, the site will serve raw index.html and break.)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Use Node 24 for JS-based actions (see GitHub Actions Node 20 deprecation notice).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write
  # deploy-pages reads the uploaded `github-pages` artifact in this workflow run
  actions: read

# Do not cancel in-progress deploys: cancelling can leave a half-done Pages deployment, after which
# the site can fall back to wrong content. If deploy races, re-run the workflow after the previous
# one finishes, or use workflow_dispatch.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
        id: pages
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify Vite output (not source index.html)
        run: |
          test -f dist/index.html
          grep -q 'assets/index' dist/index.html || (echo 'dist/index.html must reference hashed JS/CSS from npm run build' && exit 1)
          grep -q '/MyDailyApp/' dist/index.html || (echo 'dist must use base path /MyDailyApp/' && exit 1)
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
